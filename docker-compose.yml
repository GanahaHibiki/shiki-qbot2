services:
  napcat:
    image: mlikiowa/napcat-docker:latest
    container_name: napcat
    environment:
      - ACCOUNT=${QQ_ACCOUNT}
      - WS_ENABLE=true
      - NAPCAT_GID=${NAPCAT_GID:-0}
      - NAPCAT_UID=${NAPCAT_UID:-0}
    volumes:
      - ./napcat/config:/app/napcat/config
      - ./napcat/data:/app/.config/QQ
    ports:
      - "6099:6099"  # WebUI
      - "3001:3001"  # WebSocket
    restart: unless-stopped
    networks:
      - qq-bot

  bot:
    image: ptshiki/shiki-qbot1:latest
    # build: .  # 本地开发时取消注释
    container_name: qq-bot
    environment:
      - WS_URL=ws://napcat:3001
      - REPEAT_PROBABILITY=${REPEAT_PROBABILITY:-5}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    depends_on:
      - napcat
    restart: unless-stopped
    networks:
      - qq-bot

networks:
  qq-bot:
    driver: bridge
